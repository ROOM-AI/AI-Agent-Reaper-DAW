<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Reaper DAW</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .chat-container {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
            background: #f9f9f9;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
        }
        .user-message {
            background: #007bff;
            color: white;
            margin-left: 50px;
        }
        .agent-message {
            background: #28a745;
            color: white;
            margin-right: 50px;
        }
        .input-container {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            padding: 12px 24px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
        .status {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            background: #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 AI Agent Reaper DAW 🎵</h1>
        <div class="chat-container" id="chatContainer">
            <div class="message agent-message">
                <strong>AI Agent:</strong> Hello! I'm your AI assistant for REAPER DAW. I can help you with mixing, mastering, and audio production. What would you like me to do?
            </div>
        </div>
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Try: 'add reverb to track 1' or 'boost the bass'" />
            <button onclick="sendMessage()">Send</button>
        </div>
        <div class="status" id="status">Ready to help with your DAW!</div>
    </div>

    <script>
        function addMessage(content, isUser = false) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'agent-message'}`;
            messageDiv.innerHTML = `<strong>${isUser ? 'You' : 'AI Agent'}:</strong> ${content}`;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, true);
            input.value = '';
            
            const status = document.getElementById('status');
            status.textContent = 'AI Agent is thinking...';
            status.style.background = '#fff3cd';

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        prompt: message,
                        session_id: 'web_interface'
                    })
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    addMessage(data.message);
                    status.textContent = 'Command processed successfully!';
                    status.style.background = '#d4edda';
                } else {
                    addMessage('Sorry, there was an error: ' + data.message);
                    status.textContent = 'Error occurred';
                    status.style.background = '#f8d7da';
                }
            } catch (error) {
                addMessage('Connection error: ' + error.message);
                status.textContent = 'Connection failed';
                status.style.background = '#f8d7da';
            }
        }

        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
