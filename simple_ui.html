<!DOCTYPE html>
<html>
<head>
    <title>CursorDAW Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        input, button { padding: 10px; margin: 5px; }
        #log { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; background: #f9f9f9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CursorDAW Test</h1>
        <div>
            <input type="text" id="message" placeholder="Type your message..." style="width: 70%;">
            <button onclick="sendMessage()">Send</button>
        </div>
        <div id="log"></div>
    </div>

    <script>
        function log(message) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += '<div>' + new Date().toLocaleTimeString() + ': ' + message + '</div>';
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function sendMessage() {
            const message = document.getElementById('message').value;
            if (!message) return;
            
            log('Sending: ' + message);
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        session_id: 'demo',
                        text: message
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log('Response: ' + JSON.stringify(data, null, 2));
                } else {
                    log('Error: ' + response.status + ' ' + response.statusText);
                }
            } catch (error) {
                log('Network Error: ' + error.message);
            }
            
            document.getElementById('message').value = '';
        }

        // Enter key support
        document.getElementById('message').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
